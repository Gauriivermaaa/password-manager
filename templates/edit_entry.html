{% extends "base.html" %}
{% block title %}Edit Entry — VaultX{% endblock %}

{% block content %}
<div class="auth-box">
  <h2>Edit Entry</h2>
  <form method="POST">
    <label>Title *</label>
    <input type="text" name="title" value="{{ entry.title }}" required>

    <label>Username / Email</label>
    <input type="text" name="username" value="{{ entry.username or '' }}">

    <label>Password</label>
    <input type="text" name="password" value="{{ decrypted_password }}">

    <label>URL</label>
    <input type="url" name="url" value="{{ entry.url or '' }}">

    <label>Notes</label>
    <textarea name="notes">{{ entry.notes or '' }}</textarea>

    <button type="submit">Save Changes</button>
  </form>
  <p><a href="{{ url_for('dashboard') }}">← Back</a></p>
</div>
{% endblock %}
